name: Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  signed-release-apk:
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v4
      - name: Restore release signing material
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          mkdir -p release-signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-signing/openvta-logger-release.jks
          chmod 600 release-signing/openvta-logger-release.jks

          {
            echo "storeFile=openvta-logger-release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > release-signing/keystore.properties
          chmod 600 release-signing/keystore.properties
      - name: Build signed release APK
        run: ./gradlew assembleRelease --console=plain
      - name: Verify APK signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenVTA-Logger-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
