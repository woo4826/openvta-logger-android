name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6.2.0
      - uses: android-actions/setup-android@v4
      - name: Validate QA scripts
        run: |
          bash -n scripts/emulator_verify.sh
          bash -n scripts/compare_vta_speed_mock.sh
          bash -n scripts/local_ftp_upload_verify.sh
      - name: Build debug APK
        run: ./gradlew assembleDebug --console=plain --stacktrace
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --console=plain --stacktrace
      - name: Run Android lint
        run: ./gradlew lintDebug --console=plain --stacktrace
      - name: Upload build failure reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-ci-build-failure-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/lint-results-debug.*
          if-no-files-found: warn
