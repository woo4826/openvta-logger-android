name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6.2.0
      - uses: android-actions/setup-android@v4
      - name: Validate QA scripts
        run: |
          bash -n scripts/emulator_verify.sh
          bash -n scripts/compare_vta_speed_mock.sh
          bash -n scripts/local_ftp_upload_verify.sh
      - name: Build debug APK
        run: ./gradlew assembleDebug --console=plain --stacktrace
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --console=plain --stacktrace
      - name: Run Android lint
        run: ./gradlew lintDebug --console=plain --stacktrace
      - name: Upload build failure reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-ci-build-failure-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/lint-results-debug.*
          if-no-files-found: warn

  connected-emulator-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6.2.0
      - uses: android-actions/setup-android@v4
      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run emulator instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: |
            mkdir -p "$RUNNER_TEMP/openvta-android-ci"
            adb emu geo fix 126.9780 37.5665 38 9 5.40
            ./gradlew connectedDebugAndroidTest --console=plain --stacktrace
            SCREENSHOT_DIR="$RUNNER_TEMP/openvta-android-ci" ./scripts/emulator_verify.sh
      - name: Upload emulator failure reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-ci-emulator-failure-reports
          path: |
            app/build/reports/**
            app/build/outputs/androidTest-results/**
            app/build/outputs/connected_android_test_additional_output/**
            ${{ runner.temp }}/openvta-android-ci/**
          if-no-files-found: warn
